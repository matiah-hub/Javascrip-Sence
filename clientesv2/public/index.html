<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Clientes </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }

        .container {
            margin-top: 30px;
        }

        .card {
            border-radius: 12px;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="container">
    <h1 class="text-center mb-4">Dashboard Clientes</h1>

    <div class="row">
        <div class="col-md-4">
            <div class="card p-4 mb-3">
                <h5>Gestión de Datos</h5>
                <hr>
                <input id="rut" class="form-control mb-2" placeholder="RUT">
                <input id="nombre" class="form-control mb-2" placeholder="Nombre">
                <input id="edad" type="number" class="form-control mb-2" placeholder="Edad">
                <button onclick="guardar()" class="btn btn-success w-100 mb-2">Crear Cliente</button>
                <button onclick="actualizar()" class="btn btn-primary w-100">Actualizar Nombre del cliente </button>
            </div>

            <div class="card p-4">
                <h5>Acciones Especiales</h5>
                <p class="small text-muted">Usa el buscador para filtrar o borrar (solo si es 1).</p>
                <input id="buscar" class="form-control mb-2" placeholder="Nombre, RUT o Edad">
                <div class="d-flex gap-2">
                    <button onclick="listar()" class="btn btn-dark w-100">Consultar</button>
                    <button onclick="borrar()" class="btn btn-danger w-100">Eliminar</button>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>RUT</th>
                            <th>Nombre</th>
                            <th>Edad</th>
                        </tr>
                    </thead>
                    <tbody id="lista"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function listar() {
            const criterio = document.getElementById('buscar').value;
            const res = await fetch(`/clientes?nombre=${criterio}`);
            const j = await res.json();
            const tbody = document.getElementById('lista');
            if (j.ok) {
                tbody.innerHTML = j.data.map(c => `<tr><td>${c.rut}</td><td>${c.nombre}</td><td>${c.edad}</td></tr>`).join('');
            } else {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center">${j.mensaje}</td></tr>`;
            }
        }

        async function guardar() {
            const body = { rut: document.getElementById('rut').value, nombre: document.getElementById('nombre').value, edad: document.getElementById('edad').value };
            const res = await fetch('/clientes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            const j = await res.json();
            alert(j.ok ? "Registrado: " + j.data.nombre : "Error: " + j.mensaje);
            listar();
        }

        async function actualizar() {
            const rut = document.getElementById('rut').value;
            const nombre = document.getElementById('nombre').value;
            const res = await fetch(`/clientes/${rut}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nombre }) });
            const j = await res.json();
            alert(j.mensaje);
            listar();
        }

        async function borrar() {
            const val = document.getElementById('buscar').value;
            const res = await fetch(`/clientes?nombre=${val}`, { method: 'DELETE' });
            const j = await res.json();
            alert(j.mensaje);
            listar();
        }

        window.onload = listar;
    </script>
</body>

</html>
