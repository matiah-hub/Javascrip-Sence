<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Tienda Digimon M6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top { height: 180px; object-fit: contain; background: #f8f9fa; padding: 10px; }
        .card { transition: all 0.3s; border: none; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="mb-4">👾 Digimon Store - Backend M6</h2>
        <div class="row">
            <div class="col-md-8">
                <div id="lista-productos" class="row g-3"></div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0">Carrito</h5>
                            <button class="btn btn-sm btn-outline-danger" onclick="vaciarCarrito()">Limpiar</button>
                        </div>
                        <hr>
                        <ul id="contenido-carrito" class="list-unstyled"></ul>
                        <button class="btn btn-success w-100 py-2 mt-3" id="btnComprar" onclick="comprarAhora()" disabled>Confirmar Compra</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let carrito = [];

        async function cargarCatalogo() {
            try {
                const res = await fetch('/productos');
                const productos = await res.json();
                const contenedor = document.getElementById('lista-productos');
                
                contenedor.innerHTML = productos.map(p => `
                    <div class="col-md-6">
                        <div class="card h-100 shadow-sm">
                            <img src="${p.img}" class="card-img-top" alt="${p.nombre}">
                            <div class="card-body d-flex flex-column">
                                <h6 class="fw-bold">${p.nombre}</h6>
                                <p class="text-primary fw-bold mb-1">$${p.precio.toLocaleString()}</p>
                                <p class="small text-muted">Stock: ${p.stock}</p>
                                <button class="btn btn-primary btn-sm mt-auto" 
                                        onclick="agregar('${p.id}', '${p.nombre}')" 
                                        ${p.stock <= 0 ? 'disabled' : ''}>
                                    ${p.stock <= 0 ? 'Sin Stock' : 'Agregar'}
                                </button>
                            </div>
                        </div>
                    </div>`).join('');
            } catch (e) { console.error("Error al cargar:", e); }
        }

        function agregar(id, nombre) {
            carrito.push({ id, nombre });
            render();
        }

        function quitar(index) {
            carrito.splice(index, 1);
            render();
        }

        function vaciarCarrito() {
            carrito = [];
            render();
        }

        function render() {
            const lista = document.getElementById('contenido-carrito');
            const btn = document.getElementById('btnComprar');
            if (carrito.length === 0) {
                lista.innerHTML = '<li class="text-muted text-center small">Vacio</li>';
                btn.disabled = true;
            } else {
                lista.innerHTML = carrito.map((item, index) => `
                    <li class="d-flex justify-content-between align-items-center py-2 border-bottom">
                        <small>${item.nombre}</small>
                        <button class="btn btn-sm text-danger" onclick="quitar(${index})">✕</button>
                    </li>`).join('');
                btn.disabled = false;
            }
        }

        async function comprarAhora() {
            const res = await fetch('/venta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: carrito })
            });
            const data = await res.json();
            if (res.ok) {
                alert("✅ Venta Exitosa\nID: " + data.idVenta);
                vaciarCarrito();
                cargarCatalogo();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        document.addEventListener('DOMContentLoaded', cargarCatalogo);
    </script>
</body>
</html>
