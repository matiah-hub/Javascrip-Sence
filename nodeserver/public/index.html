<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del digimundo </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero-section { padding: 60px 0; background: #2c3e50; color: white; text-align: center; }
        .card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body>

    <header class="hero-section mb-5">
        <h1>Sistema de Gestión de la tablita de pgadmin</h1>
        <p>Control de Finanzas y Registro de Clientes Oficiales</p>
    </header>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title text-primary">📊 Finanzas Personales</h5>
                        <p class="card-text">Consulta el estado de cuentas, deudas y cobros .</p>
                        <a href="/finanzas" class="btn btn-primary w-100">Ir a Finanzas</a>
                    </div>
                </div>
            </div>

            <div class="col-md-5 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title text-success">👤 Gestión de Clientes</h5>
                        <p class="card-text">Ver listado de clientes y automatización de tablas .</p>
                        <a href="/clientes" class="btn btn-success w-100">Ir a Clientes</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

 

</body>
</html>
