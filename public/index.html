<!DOCTYPE html>
<html lang="es">

<head>
    <title>Sistema de Ventas - La Reina</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f4f4f4;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #6200ea;
            color: white;
        }
    </style>
</head>

<body>
    <h1>👑 Sistema de Ventas y Despachos</h1>

    <div class="card">
        <h3>1. Stock Disponible</h3>
        <table id="tablaProductos">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h3>2. Realizar Compra (Transacción)</h3>
        <p>RUT: 11111111-1 | Dirección: isla file</p>
        <label>ID Producto: </label><input type="number" id="prodId" value="1">
        <label>Cantidad: </label><input type="number" id="prodCant" value="1">
        <button onclick="comprar()">Confirmar Compra</button>
    </div>

    <script>
        async function cargarProductos() {
            const res = await fetch('/productos');
            const data = await res.json();
            const cuerpo = document.querySelector('#tablaProductos tbody');
            cuerpo.innerHTML = data.map(p => `<tr><td>${p.id_producto}</td><td>${p.nombre}</td><td>$${p.precio}</td><td>${p.existencias}</td></tr>`).join('');
        }

        async function comprar() {
            const id = document.getElementById('prodId').value;
            const cant = document.getElementById('prodCant').value;

            const res = await fetch('/comprar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    rut: "1-1",
                    id_direccion: 1,
                    carrito: [{ id_producto: id, cantidad: parseInt(cant) }]
                })
            });
            const data = await res.json();
            alert(data.mensaje);
            cargarProductos(); // Refrescar tabla
        }
        cargarProductos();
    </script>
</body>

</html>
